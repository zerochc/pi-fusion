# MoA (Mixture of Agents) Configuration
# Place at: ~/.pi/moa/config.yaml

panelists:
  - role: reasoning
    provider: deepseek
    model: deepseek-v4-pro
    thinking: xhigh

  - role: coding
    provider: kimi-coding
    model: kimi-for-coding
    thinking: xhigh

synthesizer:
  provider: deepseek
  model: deepseek-v4-pro
  thinking: xhigh
  systemPrompt: |
    You are a synthesizer. You will receive responses from multiple AI models analyzing the same problem.
    Identify agreements and disagreements, select the best reasoning, and produce a single coherent answer.

strategy:
  mode: parallel
  timeout_seconds: 120
  max_panelists: 2
